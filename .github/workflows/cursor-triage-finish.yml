name: Finish Cursor PostHog triage

on:
  push:
    branches:
      - cursor/triage-process-investigation-a9ed
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number
        required: true
        type: number
      verdict:
        description: Triage outcome
        required: true
        type: choice
        options:
          - skipped
          - fixed
      comment_body:
        description: Markdown comment to post on the issue
        required: true
        type: string

concurrency:
  group: cursor-triage-finish-${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || 'push' }}
  cancel-in-progress: false

jobs:
  close-issue-71:
    if: github.event_name == 'push' && github.ref == 'refs/heads/cursor/triage-process-investigation-a9ed'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close already-triaged issue 71
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state=$(gh issue view 71 --repo "${{ github.repository }}" --json state -q '.state')
          if [ "$state" = "OPEN" ]; then
            gh issue close 71 --repo "${{ github.repository }}"
          fi

  finish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post triage comment
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ inputs.comment_body }}
        run: |
          printf '%s\n' "$COMMENT_BODY" > /tmp/triage-comment.md
          gh issue comment "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/triage-comment.md

      - name: Update triage labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          verdict="${{ inputs.verdict }}"
          add_label="cursor-${verdict}"
          gh issue edit "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --remove-label cursor-processing,cursor-fix \
            --add-label "$add_label"

      - name: Close triaged issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "${{ inputs.issue_number }}" \
            --repo "${{ github.repository }}"
