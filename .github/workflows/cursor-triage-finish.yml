name: Finish Cursor PostHog triage

on:
  repository_dispatch:
    types: [cursor-triage-complete]

concurrency:
  group: cursor-triage-finish-${{ github.event.client_payload.issue_number }}
  cancel-in-progress: false

jobs:
  finish:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Validate payload
        id: gate
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          issue_number=$(echo "$PAYLOAD" | jq -r '.issue_number // empty')
          verdict=$(echo "$PAYLOAD" | jq -r '.verdict // empty')
          if [ -z "$issue_number" ] || [ -z "$verdict" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$verdict" in
            skipped|fixed) ;;
            *)
              echo "missing=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"

      - name: Post triage comment
        if: steps.gate.outputs.missing != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          VERDICT: ${{ steps.gate.outputs.verdict }}
          COMMENT: ${{ github.event.client_payload.comment }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$COMMENT" ]; then
            body="$COMMENT"
          else
            body="Cursor triage complete — verdict: \`$VERDICT\`."
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$body"

      - name: Update labels
        if: steps.gate.outputs.missing != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.gate.outputs.issue_number }}
          VERDICT: ${{ steps.gate.outputs.verdict }}
          REPO: ${{ github.repository }}
        run: |
          add_label="cursor-${VERDICT}"
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
            --remove-label cursor-processing,cursor-fix \
            --add-label "$add_label"
