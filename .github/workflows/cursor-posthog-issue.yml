name: Trigger Cursor on PostHog issue

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: cursor-posthog
  cancel-in-progress: false

jobs:
  trigger:
    if: |
      (github.event.action == 'opened' &&
        github.event.issue.user.login == 'app/posthog-eu') ||
      (github.event.action == 'labeled' &&
        github.event.label.name == 'cursor-fix')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Prepare retry (cursor-fix)
        if: github.event.action == 'labeled'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state=$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" --json state -q '.state')
          if [ "$state" = "CLOSED" ]; then
            gh issue reopen "${{ github.event.issue.number }}" \
              --repo "${{ github.repository }}"
          fi
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label cursor-fixed,cursor-skipped 2>/dev/null || true

      - name: Dedup gate
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          labels=$(gh issue view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" --json labels \
            -q '.labels[].name')
          echo "$labels" | grep -qx 'cursor-processing' && echo "skip=true" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event.action }}" != 'labeled' ]; then
            echo "$labels" | grep -Eq 'cursor-fixed|cursor-skipped' && echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build payload
        if: steps.gate.outputs.skip != 'true'
        id: payload
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          FORCE: ${{ github.event.action == 'labeled' && github.event.label.name == 'cursor-fix' }}
        run: |
          issue_url=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json url -q '.url')
          posthog_id=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json body -q '.body' \
            | grep -oE 'error_tracking/[0-9a-f-]+' | head -1 | cut -d/ -f2)
          if [ -z "$posthog_id" ]; then
            echo "missing_id=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          jq -n \
            --argjson num "$ISSUE_NUMBER" \
            --arg url "$issue_url" \
            --arg ph_id "$posthog_id" \
            --arg repo "$REPO" \
            --argjson force "$([ "$FORCE" = true ] && echo true || echo false)" \
            '{issue_number:$num, issue_url:$url, posthog_issue_id:$ph_id, repo:$repo, force:$force}' \
            > /tmp/cursor-payload.json
          echo "payload_path=/tmp/cursor-payload.json" >> "$GITHUB_OUTPUT"

      - name: Trigger Cursor webhook
        if: steps.gate.outputs.skip != 'true' && steps.payload.outputs.missing_id != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURSOR_WEBHOOK_URL: ${{ secrets.CURSOR_WEBHOOK_URL }}
          CURSOR_AUTOMATION_TOKEN: ${{ secrets.CURSOR_AUTOMATION_TOKEN }}
        run: |
          curl -fsSL -X POST "$CURSOR_WEBHOOK_URL" \
            -H "Authorization: Bearer $CURSOR_AUTOMATION_TOKEN" \
            -H "Content-Type: application/json" \
            -d @"${{ steps.payload.outputs.payload_path }}"
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label cursor-processing
