name: Translation fix
description: German, Polish, or Ukrainian wording is wrong or awkward
title: "[i18n] "
labels:
  - translation
body:
  - type: markdown
    attributes:
      value: |
        Machine-translated locales may need a human pass. Describe where the text appears and what it should say.
  - type: dropdown
    id: locale
    attributes:
      label: Locale
      options:
        - de (German)
        - pl (Polish)
        - ukr (Ukrainian)
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where in the UI
      description: Screen, button, banner, or section name
      placeholder: Walkthrough "Something off?" tip 2
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current wording (if you can copy it)
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording
      description: Your proposed fix in the target language (or English gloss)
    validations:
      required: true
